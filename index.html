<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Akbar Jam</title>

<meta name="description" content="Editor tampilan kode sederhana seperti VSCode">
<meta name="theme-color" content="#1e1e1e">
<meta name="author" content="Akbar">
<meta name="keywords" content="editor, code, vscode clone, html css js">
<meta name="robots" content="index, follow">
<link rel="icon" href="icon.svg">
<link rel="stylesheet" href="./index.css"/>
</head>

<body>
<h2>Akbar Jam</h2>

<div class="editor">
  <div class="tabs">
    <div class="tab">
      <img src="./js.png"> bp.js
    </div>

    <div class="tab active">
      <span class="brace">{}</span>
      jam.json
      <span class="close">×</span>
    </div>

    <div class="tab">
      <img src="./php.png"> koneksi.php
    </div>
  </div>

  <div class="filebar">
    <span class="brace">{}</span> jam.json > ...
  </div>

  <div class="code">
    <div class="lines">
      <div data-line="1">1</div>
      <div data-line="2">2</div>
      <div data-line="3">3</div>
      <div data-line="4">4</div>
      <div data-line="5">5</div>
      <div data-line="6">6</div>
      <div data-line="7">7</div>
    </div>

    <div class="content">
      <div class="line" data-line="1"><span class="brace">{</span></div>
      <div class="line" data-line="2"><span class="key">"Hours"</span>: <span class="string">"<span id="hours"></span>"</span>,</div>
      <div class="line" data-line="3"><span class="key">"Minutes"</span>: <span class="string">"<span id="min"></span>"</span>,</div>
      <div class="line" data-line="4"><span class="key">"Seconds"</span>: <span class="string">"<span id="sec"></span>"</span></div>
      <div class="line" data-line="5"></div>
      <div class="line" data-line="6"></div>
      <div class="line" data-line="7"><span class="brace">}</span></div>
    </div>
  </div>
</div>

<script src="./index.js"></script>
</body>
</html>
